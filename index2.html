<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau de Contrôle - Diaporama & Musique</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        /* Style Global */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #00f2fe;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.3);
        }

        .menu-container {
            display: flex;
            gap: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Boutons */
        .btn {
            padding: 18px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn-music { background: linear-gradient(135deg, #ff5722, #ff9800); }
        .btn-folder { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .btn-diapo { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        
        .btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        /* --- ZONE DIAPORAMA (SWIPER) --- */
        #diaporama-wrapper {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Bouton Quitter */
        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10005;
            transition: background 0.2s;
        }
        .btn-close:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>

    <h1>Gestionnaire d'Ambiance</h1>

    <div class="menu-container">
        <button class="btn btn-music" onclick="ouvrirMusique()">🎵 Lancer la Musique</button>
        
        <button class="btn btn-folder" id="btn-folder" onclick="choisirDossier()">📂 Sélectionner le Dossier Images</button>
        
        <button class="btn btn-diapo" id="btn-diapo" onclick="lancerDiaporama()" disabled>🖼️ Lancer le Diaporama</button>
    </div>

    <div id="diaporama-wrapper">
        <button class="btn-close" onclick="quitterDiaporama()">✖ Quitter (Échap)</button>
        <div class="swiper">
            <div class="swiper-wrapper" id="slides-container">
                </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- 1. CONFIGURATION DE LA MUSIQUE ---
        function ouvrirMusique() {
            // Remplace ce lien par ta playlist ou ton site de musique cible
            window.open("https://mi.42web.io/yt/www.php?list=PLS19zOYsmnkwokOUuQC0Kw0M8HAdtWVYj&title=Ori%20and%20the%20Will%20of%20the%20Wisps%20(Original%20Soundtrack)&time=1781430650&auto", "_blank");
        }

        // --- 2. GESTION DU STOCKAGE DU DOSSIER (IndexedDB) ---
        let db;
        let dossierHandle = null;
        const btnDiapo = document.getElementById('btn-diapo');
        const btnFolder = document.getElementById('btn-folder');

        // Initialisation de la base de données locale du navigateur
        const request = indexedDB.open("DiaporamaDB", 1);
        request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore("尋handles");
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            verifierDossierMemorise();
        };

        // Vérifie si l'utilisateur a déjà configuré un dossier auparavant
        async function verifierDossierMemorise() {
            const tx = db.transaction("尋handles", "readonly");
            const store = tx.objectStore("尋handles");
            const req = store.get("dossierImages");
            
            req.onsuccess = async () => {
                if (req.result) {
                    dossierHandle = req.result;
                    // Demande la simple vérification des droits (exigence de sécurité du navigateur)
                    const options = { mode: 'read' };
                    if (await dossierHandle.queryPermission(options) === 'granted') {
                        activerDiaporama();
                    } else {
                        btnFolder.innerText = "🔄 Re-autoriser l'accès au Dossier";
                    }
                }
            };
        }

        // --- 3. SÉLECTION ET LECTURE DU DOSSIER LOCAL ---
        async function choisirDossier() {
            try {
                // Ouvre la fenêtre native Windows pour choisir un dossier
                dossierHandle = await window.showDirectoryPicker();
                
                // Sauvegarde le dossier dans IndexedDB pour la prochaine fois
                const tx = db.transaction("尋handles", "readwrite");
                tx.objectStore("尋handles").put(dossierHandle, "dossierImages");
                
                activerDiaporama();
            } catch (err) {
                console.log("Sélection annulée ou non supportée", err);
            }
        }

        function activerDiaporama() {
            btnDiapo.disabled = false;
            btnFolder.innerText = "📁 Dossier Lié ✓";
            btnFolder.style.opacity = "0.7";
        }

        // --- 4. MOTEUR DU DIAPORAMA (SWIPER) ---
        let monSwiper = null;

        async function chargerImages() {
            const container = document.getElementById('slides-container');
            container.innerHTML = ""; // On vide les anciennes images

            // On boucle sur les fichiers du dossier local
            for await (const entry of dossierHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    // On filtre pour ne prendre que les images
                    if (file.type.startsWith('image/')) {
                        const url = URL.createObjectURL(file); // Crée un lien virtuel vers le fichier local
                        
                        // Structure requise pour les transitions Swiper
                        const slide = document.createElement('div');
                        slide.className = 'swiper-slide';
                        slide.innerHTML = `<img src="${url}" alt="${entry.name}">`;
                        container.appendChild(slide);
                    }
                }
            }
        }

        async function lancerDiaporama() {
            const wrapper = document.getElementById('diaporama-wrapper');
            
            // 1. Demande la permission d'accès si nécessaire (sécurité navigateur)
            if (await dossierHandle.queryPermission({ mode: 'read' }) !== 'granted') {
                if (await dossierHandle.requestPermission({ mode: 'read' }) !== 'granted') {
                    alert("Accès refusé au dossier.");
                    return;
                }
            }

            // 2. Charge les images du dossier en mémoire
            await chargerImages();

            if (document.querySelectorAll('.swiper-slide').length === 0) {
                alert("Le dossier sélectionné ne contient pas d'images valides.");
                return;
            }

            // 3. Affiche le conteneur et passe en plein écran automatique
            wrapper.style.display = "block";
            if (wrapper.requestFullscreen) wrapper.requestFullscreen();

            // 4. Initialise Swiper avec des effets professionnels variés
            // Tu peux changer 'creative' par 'fade', 'cube', ou 'flip' selon tes préférences.
            monSwiper = new Swiper('.swiper', {
                loop: true,
                effect: 'creative', 
                creativeEffect: {
                    prev: { shadow: true, translate: ['-20%', 0, -1] },
                    next: { translate: ['100%', 0, 0] },
                },
                autoplay: {
                    delay: 4000, // Change d'image toutes les 4 secondes
                    disableOnInteraction: false,
                },
                speed: 1000 // Durée de l'animation de transition (1 seconde)
            });
        }

        function quitterDiaporama() {
            const wrapper = document.getElementById('diaporama-wrapper');
            wrapper.style.display = "none";
            
            if (monSwiper) {
                monSwiper.destroy(true, true);
                monSwiper = null;
            }

            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        // Gestion de la touche Échap native du plein écran
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                quitterDiaporama();
            }
        });
    </script>
</body>
</html>
